  - "Claude"

ai_usage_summary: |
  Used Claude to assist with architecture discussion and code review.
  All scoring logic, feature engineering, and design decisions were made
  by the human engineer. No candidate data was fed to any external LLM
  during ranking. The ranking step itself is fully local — no API calls.

methodology_summary: |
  Hybrid multi-dimensional ranker. Five scoring components:
  (1) Skills score (40%) — weighted keyword matching against 30+ core JD signals,
  boosted by skill proficiency, duration, endorsements, and platform assessment scores.
  (2) Experience score (25%) — YoE band fit + product vs services company ratio + tenure.
  (3) Title fit (15%) — current role alignment with hard disqualifiers for non-technical titles.
  (4) Location (10%) — India-based candidates preferred; relocation flag considered.
  (5) Behavioral signals (10%) — recency, recruiter response rate, notice period,
  open-to-work flag, interview completion rate, GitHub activity.
  Base score is multiplied by a research penalty (for pure-academic profiles) and a
  behavioral multiplier (0.6–1.0) to capture real-world hireability.
  Honeypot detection runs first — profiles with impossible timelines or title/skill mismatches
  are scored at 0.0. Runtime ~25 seconds for 100K candidates, CPU-only.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
